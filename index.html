<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoogleKeyword Work</title>
  <style>
    :root {
      --bg: #f4efe6;
      --bg-accent: #e6d5bd;
      --card: rgba(255, 252, 246, 0.78);
      --text: #1e1a16;
      --muted: #6f6254;
      --line: rgba(62, 45, 30, 0.14);
      --glow: #cf7d3e;
      --glow-soft: rgba(207, 125, 62, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.82), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(207, 125, 62, 0.2), transparent 22%),
        linear-gradient(135deg, var(--bg) 0%, #efe4d2 48%, var(--bg-accent) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      filter: blur(18px);
      opacity: 0.5;
      pointer-events: none;
    }

    body::before {
      width: 18rem;
      height: 18rem;
      right: -4rem;
      top: -3rem;
      background: rgba(207, 125, 62, 0.24);
    }

    body::after {
      width: 20rem;
      height: 20rem;
      left: -7rem;
      bottom: -8rem;
      background: rgba(140, 101, 69, 0.14);
    }

    .hero {
      width: min(90vw, 900px);
      padding: clamp(2rem, 6vw, 4.5rem);
      border: 1px solid var(--line);
      border-radius: 32px;
      background: var(--card);
      backdrop-filter: blur(14px);
      box-shadow:
        0 30px 80px rgba(56, 38, 22, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      text-align: center;
      animation: floatIn 900ms ease-out both;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 7vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .accent {
      display: inline-block;
      color: var(--glow);
      text-shadow: 0 0 22px var(--glow-soft);
    }

    .contact {
      margin: 1.6rem 0 0;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(62, 45, 30, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(62, 45, 30, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
      pointer-events: none;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 640px) {
      .hero {
        border-radius: 24px;
      }

      h1 {
        line-height: 1.02;
      }
    }
  </style>
</head>
<body>
  <div class="grid" aria-hidden="true"></div>
  <main class="hero">
    <h1>THIS SITE IS FOR <span class="accent">GOOGLEKEYWORD</span> WORK!</h1>
    <p class="contact">CONTACT:@grandwizardman</p>
  </main>
</body>
</html>
